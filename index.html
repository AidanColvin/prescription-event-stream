<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medicine Cabinet — Prescription Event Stream</title>
  <link rel="stylesheet" href="/assets/app.css">
</head>
<body>
  <div class="nav-wrap">
    <nav class="nav" aria-label="Primary">
      <a href="/" class="active" aria-current="page">Patient</a>
      <a href="/pharmacist">Pharmacist</a>
      <a href="/md">MD</a>
      <a href="/how-it-works">How It Works</a>
    </nav>
  </div>

  <div class="container">
    <header class="page">
      <p class="data-notice" id="data-notice">Synthetic demonstration data. No real patients.</p>
      <h1>Medicine Cabinet</h1>
      <p class="subtitle">Every medication in your family, in plain English.</p>
      <p class="status-line" id="status-line"></p>
    </header>

    <div class="controls">
      <input type="text" id="search-input" class="search" autocomplete="off"
             placeholder="Search a medication, person, or condition&hellip;"
             aria-label="Search medications">
      <select id="profile-select" class="select" aria-label="Filter by family member">
        <option value="all">Whole family</option>
      </select>
    </div>
    <p class="search-hint">Press <kbd>/</kbd> to search &middot; click any medication for details</p>

    <main id="content"><div class="empty-state">Loading your medicine cabinet&hellip;</div></main>

    <footer class="page">
      <a href="https://github.com/AidanColvin/prescription-event-stream" target="_blank" rel="noopener noreferrer">Source on GitHub</a>
      &nbsp;&middot;&nbsp;
      <a href="https://github.com/AidanColvin/prescription-event-stream/issues" target="_blank" rel="noopener noreferrer">Report a problem with this data</a>
    </footer>
  </div>

  <script src="/assets/app.js"></script>
  <script>
    let events = [];
    let query = "";
    let profile = "all";
    const openRows = new Set();

    /* Takes an ISO date of birth and returns whole years. */
    function ageFromDob(dob) {
      const born = new Date(dob + "T00:00:00");
      if (isNaN(born)) return null;
      const now = new Date();
      let years = now.getFullYear() - born.getFullYear();
      const beforeBirthday =
        now.getMonth() < born.getMonth() ||
        (now.getMonth() === born.getMonth() && now.getDate() < born.getDate());
      return beforeBirthday ? years - 1 : years;
    }

    /* Returns the refill chip for one prescription. */
    function refillChip(ev) {
      if (ev.severity !== "clear") return '<span class="chip chip-stop">Paused</span>';
      const days = parseInt(ev.next_refill_due, 10);
      if (ev.refills_remaining === 0 && isNaN(days))
        return `<span class="chip chip-plain">${esc(ev.next_refill_due)}</span>`;
      if (!isNaN(days) && days <= 7)
        return `<span class="chip chip-soon">Refill due in ${days} day${days === 1 ? "" : "s"}</span>`;
      return `<span class="chip chip-ok">Due in ${esc(ev.next_refill_due)}</span>`;
    }

    /* Renders one medication row, expandable to full detail. */
    function medRow(ev) {
      const open = openRows.has(ev.event_id) ? " open" : "";
      const finding = (ev.findings || [])[0];
      const paused = ev.severity !== "clear" && finding ? `
        <div class="paused-note"><strong>Paused by the pharmacy.</strong>
          ${esc(finding.patient_message)}</div>` : "";
      const interactionNotes = (ev.interaction_alerts || []).map((a) => `
        <div class="paused-note ${a.severity === "major" ? "note-major" : "note-moderate"}">
          <strong>${a.severity === "major" ? "Serious interaction" : "Interaction"} with ${esc(a.with_brand)}.</strong>
          ${esc(a.plain_effect)} ${esc(a.advice)}</div>`).join("");
      return `
        <div class="med-row${open}" data-id="${esc(ev.event_id)}" role="button" tabindex="0"
             aria-expanded="${open ? "true" : "false"}">
          <div class="row-top">
            <span class="med-name">${highlight(ev.medication, query)}</span>
            <span class="med-brand">${highlight(ev.brand, query)}</span>
            <span class="row-spacer"></span>
            ${refillChip(ev)}
            <span class="chevron">&#8250;</span>
          </div>
          <div class="row-sub">Treats ${highlight(ev.indication.toLowerCase(), query)} &middot; ${esc(ev.sig)}</div>
          ${paused}
          ${interactionNotes}
          <div class="row-detail">
            <div class="detail-grid">
              <div><div class="detail-label">Drug class</div><div class="detail-value">${highlight(ev.drug_class, query)}</div></div>
              <div><div class="detail-label">How it works</div><div class="detail-value">${highlight(ev.mechanism, query)}</div></div>
              <div><div class="detail-label">Approved to treat</div><div class="detail-value">${highlight(ev.approved_uses, query)}</div></div>
              <div><div class="detail-label">Common off-label uses</div><div class="detail-value">${highlight(ev.off_label, query)}</div></div>
              <div><div class="detail-label">Strength</div><div class="detail-value">${esc(ev.strength)} ${esc(ev.form)}</div></div>
              <div><div class="detail-label">Quantity per fill</div><div class="detail-value">${esc(ev.quantity)}</div></div>
              <div><div class="detail-label">Refills left</div><div class="detail-value">${esc(ev.refills_remaining)}</div></div>
              <div><div class="detail-label">Prescribed by</div><div class="detail-value">${highlight(ev.prescriber, query)}</div></div>
              <div><div class="detail-label">Possible side effects</div><div class="detail-value">${esc(ev.side_effects)}</div></div>
              <div><div class="detail-label">How to store it</div><div class="detail-value">${esc(ev.storage)}</div></div>
              <div><div class="detail-label">Avoid mixing with</div><div class="detail-value">${highlight(ev.interactions, query)}</div></div>
              <div><div class="detail-label">Not for people with</div><div class="detail-value">${esc(ev.contraindications)}</div></div>
            </div>
          </div>
        </div>`;
    }

    function render() {
      const container = document.getElementById("content");
      const visible = events.filter((ev) =>
        matchesQuery(ev, query) && (profile === "all" || ev.patient === profile));

      const paused = events.filter((ev) => ev.severity !== "clear").length;
      document.getElementById("status-line").innerHTML = paused
        ? `<strong>${paused} prescription${paused === 1 ? "" : "s"}</strong> need${paused === 1 ? "s" : ""} your attention. Everything else is on track.`
        : "Everything is on track.";

      const external = externalMedSection(events, query, render);

      if (!visible.length) {
        container.innerHTML = external + (external.includes("medinfo") ? `
          <p class="external-hint">Nobody in your family takes this medication.</p>` : `
          <div class="empty-state">
            <p class="big">No medications match.</p>
            <p>Try any drug name, generic or brand &mdash; even ones your family doesn&rsquo;t take.</p>
          </div>`);
        return;
      }

      /* Group by person; anyone with a paused prescription lists first. */
      const byPerson = new Map();
      for (const ev of visible) {
        if (!byPerson.has(ev.patient)) byPerson.set(ev.patient, []);
        byPerson.get(ev.patient).push(ev);
      }
      const people = [...byPerson.entries()].sort((a, b) => {
        const flagged = (list) => list.some((e) => e.severity !== "clear") ? 0 : 1;
        return flagged(a[1]) - flagged(b[1]) || a[0].localeCompare(b[0]);
      });

      container.innerHTML = medInfoSection(events, query) + external + people.map(([name, list]) => {
        list.sort((a, b) => {
          const urgency = (e) => e.severity !== "clear" ? -1 : (parseInt(e.next_refill_due, 10) || 999);
          return urgency(a) - urgency(b);
        });
        const age = ageFromDob(list[0].dob);
        return `
          <h2 class="section-title">${highlight(name, query)}${age !== null ? `, ${age}` : ""}
            &middot; ${list.length} medication${list.length === 1 ? "" : "s"}</h2>
          <div class="card">${list.map(medRow).join("")}</div>`;
      }).join("");

      container.querySelectorAll(".med-row").forEach((row) => {
        const toggle = () => {
          const id = row.dataset.id;
          openRows.has(id) ? openRows.delete(id) : openRows.add(id);
          row.classList.toggle("open");
          row.setAttribute("aria-expanded", row.classList.contains("open"));
        };
        row.addEventListener("click", toggle);
        row.addEventListener("keydown", (e) => {
          if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggle(); }
        });
      });
    }

    async function init() {
      const searchInput = document.getElementById("search-input");
      const profileSelect = document.getElementById("profile-select");
      bindSearch(searchInput, (value) => { query = value; render(); });
      profileSelect.addEventListener("change", () => { profile = profileSelect.value; render(); });

      try {
        const payload = await loadPayload();
        events = payload.events;
        for (const name of [...new Set(events.map((e) => e.patient))].sort()) {
          const option = document.createElement("option");
          option.value = name;
          option.textContent = name;
          profileSelect.appendChild(option);
        }
        render();
      } catch (err) {
        console.error("Stream connection error:", err);
        renderLoadError(document.getElementById("content"));
      }
    }

    init();
  </script>
</body>
</html>
