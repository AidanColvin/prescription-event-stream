<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Second Look — Prescription Event Stream</title>
  <link rel="stylesheet" href="/assets/app.css">
</head>
<body>
  <div class="nav-wrap">
    <nav class="nav" aria-label="Primary">
      <a href="/">Patient</a>
      <a href="/pharmacist" class="active" aria-current="page">Pharmacist</a>
      <a href="/md">MD</a>
      <a href="/how-it-works">How It Works</a>
    </nav>
  </div>

  <div class="container">
    <header class="page">
      <p class="data-notice" id="data-notice">Synthetic demonstration data. No real patients.</p>
      <h1>Second Look</h1>
      <p class="subtitle">Every prescription gets one.</p>
      <p class="status-line" id="clearance-line"></p>
    </header>

    <div class="controls">
      <input type="text" id="search-input" class="search" autocomplete="off"
             placeholder="Search the whole queue&hellip;" aria-label="Search the queue">
    </div>
    <p class="search-hint">Press <kbd>/</kbd> to search &middot; search reaches cleared prescriptions too</p>

    <main id="content"><div class="empty-state">Reading the queue&hellip;</div></main>

    <footer class="page">
      <a href="https://github.com/AidanColvin/prescription-event-stream" target="_blank" rel="noopener noreferrer">Source on GitHub</a>
      &nbsp;&middot;&nbsp;
      <a href="https://github.com/AidanColvin/prescription-event-stream/issues" target="_blank" rel="noopener noreferrer">Report a problem with this data</a>
    </footer>
  </div>

  <script src="/assets/app.js"></script>
  <script>
    let events = [];
    let query = "";
    let clearedOpen = false;
    const resolved = new Set();

    const stopped = () => events.filter((ev) => ev.severity !== "clear" && !resolved.has(ev.event_id));
    const cleared = () => events.filter((ev) => ev.severity === "clear" || resolved.has(ev.event_id));

    /* Renders one numbered finding inside a verdict card. */
    function findingBlock(finding, index) {
      return `
        <div class="finding">
          <span class="finding-index">${index + 1}</span>
          <div>
            <p class="headline">${esc(finding.headline)}</p>
            <p class="why">${esc(finding.pharmacist_message)}</p>
            <p class="citation">${esc(finding.citation)}
              <a href="${esc(finding.citation_url)}" target="_blank" rel="noopener noreferrer">Read the rule</a></p>
          </div>
        </div>`;
    }

    /* Renders one stopped prescription as a verdict card. */
    function verdictCard(ev) {
      return `
        <div class="verdict-card" data-id="${esc(ev.event_id)}">
          <h2 class="verdict">${esc(ev.verdict)}</h2>
          <p class="verdict-sub">${highlight(ev.patient, query)}, ${esc(ev.event_id)}.
            ${highlight(ev.medication, query)} ${esc(ev.strength)}, quantity ${esc(ev.quantity)},
            ${esc(ev.refills)} refill${ev.refills === 1 ? "" : "s"}.
            Written by ${highlight(ev.prescriber, query)}.</p>
          ${(ev.findings || []).map(findingBlock).join("")}
          <div class="card-actions">
            <button class="btn btn-primary" data-action="call">${esc((ev.findings[0] || {}).suggested_action || "Call the prescriber")}</button>
            <button class="btn btn-secondary" data-action="resolve">Mark resolved</button>
            <button class="btn btn-secondary" data-action="refuse">Document refusal</button>
          </div>
        </div>`;
    }

    /* Renders a cleared prescription as one compact table row. */
    function clearedRow(ev) {
      const deaMark = { valid: "&#10003; Valid", not_required: "&mdash;" }[ev.dea_status] || esc(ev.dea_status);
      return `
        <tr>
          <td><strong>${highlight(ev.patient, query)}</strong><br>
            <span style="font-family:ui-monospace,Menlo,monospace;font-size:12px;color:var(--muted)">${esc(ev.event_id)}</span></td>
          <td><strong>${highlight(ev.medication, query)} / ${highlight(ev.brand, query)}</strong><br>
            <span style="font-size:12.5px;color:var(--muted)">${esc(ev.strength)} ${esc(ev.form)}</span></td>
          <td>${highlight(ev.dea_schedule, query)}</td>
          <td>Qty ${esc(ev.quantity)} &middot; ${esc(ev.refills_remaining)} refills</td>
          <td><span class="chip ${resolved.has(ev.event_id) ? "chip-plain" : "chip-ok"}">${resolved.has(ev.event_id) ? "Resolved" : "Cleared"}</span></td>
        </tr>`;
    }

    function render() {
      const container = document.getElementById("content");
      const read = events.length;
      const fine = cleared().length;
      document.getElementById("clearance-line").innerHTML =
        `<strong>${read}</strong> prescriptions read this morning. <strong>${fine}</strong> are fine.`;

      const stoppedVisible = stopped().filter((ev) => matchesQuery(ev, query));
      const clearedVisible = cleared().filter((ev) => matchesQuery(ev, query));
      const showCleared = clearedOpen || Boolean(query);

      let html = "";

      if (!stopped().length) {
        html += `
          <div class="empty-state queue-empty">
            <p class="big">Nothing is waiting on you.</p>
            <p>All ${read} prescriptions cleared every rule.</p>
          </div>`;
      } else if (!stoppedVisible.length && query && !clearedVisible.length) {
        html += `
          <div class="empty-state queue-empty">
            <p class="big">Nothing is waiting on you.</p>
            <p>No prescription matches &ldquo;${esc(query)}&rdquo;.</p>
          </div>`;
      } else {
        html += stoppedVisible.map(verdictCard).join("");
      }

      if (clearedVisible.length && (showCleared || !stopped().length)) {
        html += `
          <h2 class="section-title">${query ? "Matches in the cleared queue" : "Cleared this morning"}</h2>
          <div class="card table-card">
            <table>
              <thead><tr><th>Patient</th><th>Medication</th><th>Schedule</th><th>Quantity</th><th>Status</th></tr></thead>
              <tbody>${clearedVisible.map(clearedRow).join("")}</tbody>
            </table>
          </div>`;
      } else if (!query && stopped().length) {
        html += `
          <div style="text-align:center;margin-top:8px">
            <button class="btn-link" id="show-cleared">${fine} cleared every rule &mdash; view them</button>
          </div>`;
      }

      container.innerHTML = html;

      const showClearedBtn = document.getElementById("show-cleared");
      if (showClearedBtn) showClearedBtn.addEventListener("click", () => { clearedOpen = true; render(); });

      container.querySelectorAll(".verdict-card").forEach((card) => {
        const id = card.dataset.id;
        const ev = events.find((e) => e.event_id === id);
        card.querySelector('[data-action="call"]').addEventListener("click", () =>
          showToast(`Calling ${ev.prescriber} about ${id}…`));
        card.querySelector('[data-action="resolve"]').addEventListener("click", () => {
          resolved.add(id);
          showToast(`${id} marked resolved.`);
          render();
        });
        card.querySelector('[data-action="refuse"]').addEventListener("click", () => {
          resolved.add(id);
          showToast(`Refusal documented for ${id}.`);
          render();
        });
      });
    }

    async function init() {
      bindSearch(document.getElementById("search-input"), (value) => { query = value; render(); });
      try {
        const payload = await loadPayload();
        events = payload.events;
        render();
      } catch (err) {
        console.error("Stream connection error:", err);
        renderLoadError(document.getElementById("content"));
      }
    }

    init();
  </script>
</body>
</html>
