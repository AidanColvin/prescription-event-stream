<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 920 470" xmlns="http://www.w3.org/2000/svg" role="img"
             aria-label="Pipeline diagram: the event queue flows through three rules into one finding rendered on three surfaces"
             font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">
          <defs>
            <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
              <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#86868b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
            </marker>
          </defs>

          <!-- Queue -->
          <rect x="20" y="170" width="180" height="120" rx="16" fill="#ffffff" stroke="#d2d2d7"/>
          <text x="110" y="212" font-size="15" font-weight="600" fill="#1d1d1f" text-anchor="middle">Refill queue</text>
          <text x="110" y="234" font-size="12" fill="#86868b" text-anchor="middle">16 synthetic events</text>
          <text x="110" y="252" font-size="11.5" fill="#86868b" text-anchor="middle" font-family="ui-monospace, Menlo, monospace">src/ingestion.py</text>

          <line x1="200" y1="230" x2="248" y2="230" stroke="#86868b" stroke-width="1.6" marker-end="url(#arrow)"/>

          <!-- Rule engine -->
          <rect x="252" y="100" width="240" height="260" rx="16" fill="#ffffff" stroke="#d2d2d7"/>
          <text x="372" y="132" font-size="15" font-weight="600" fill="#1d1d1f" text-anchor="middle">Rule engine</text>
          <text x="372" y="150" font-size="11.5" fill="#86868b" text-anchor="middle" font-family="ui-monospace, Menlo, monospace">src/rules/</text>

          <rect x="272" y="166" width="200" height="52" rx="10" fill="#f5f5f7"/>
          <text x="284" y="188" font-size="12.5" font-weight="600" fill="#1d1d1f">R1&#160;&#160;Pediatric minimum age</text>
          <text x="284" y="206" font-size="11" fill="#86868b">DailyMed SPL 8.4</text>

          <rect x="272" y="226" width="200" height="52" rx="10" fill="#f5f5f7"/>
          <text x="284" y="248" font-size="12.5" font-weight="600" fill="#1d1d1f">R2&#160;&#160;Schedule refill limit</text>
          <text x="284" y="266" font-size="11" fill="#86868b">21 CFR 1306.12, 1306.22</text>

          <rect x="272" y="286" width="200" height="52" rx="10" fill="#f5f5f7"/>
          <text x="284" y="308" font-size="12.5" font-weight="600" fill="#1d1d1f">R3&#160;&#160;DEA validity</text>
          <text x="284" y="326" font-size="11" fill="#86868b">21 CFR 1301.13, 1306.03</text>

          <line x1="492" y1="230" x2="540" y2="230" stroke="#86868b" stroke-width="1.6" marker-end="url(#arrow)"/>

          <!-- Finding -->
          <rect x="544" y="164" width="150" height="132" rx="16" fill="#ffffff" stroke="#d2d2d7"/>
          <text x="619" y="196" font-size="15" font-weight="600" fill="#1d1d1f" text-anchor="middle">One Finding</text>
          <text x="619" y="220" font-size="11.5" fill="#86868b" text-anchor="middle">headline &#183; severity</text>
          <text x="619" y="238" font-size="11.5" fill="#86868b" text-anchor="middle">citation &#183; action</text>
          <text x="619" y="256" font-size="11.5" fill="#86868b" text-anchor="middle">three messages,</text>
          <text x="619" y="272" font-size="11.5" fill="#86868b" text-anchor="middle">one per audience</text>

          <line x1="694" y1="200" x2="742" y2="92" stroke="#86868b" stroke-width="1.6" marker-end="url(#arrow)"/>
          <line x1="694" y1="230" x2="742" y2="230" stroke="#86868b" stroke-width="1.6" marker-end="url(#arrow)"/>
          <line x1="694" y1="260" x2="742" y2="368" stroke="#86868b" stroke-width="1.6" marker-end="url(#arrow)"/>

          <!-- Surfaces -->
          <rect x="746" y="40" width="154" height="96" rx="14" fill="#ffffff" stroke="#d2d2d7"/>
          <text x="762" y="66" font-size="13" font-weight="600" fill="#1d1d1f">Patient</text>
          <text x="762" y="86" font-size="10.5" fill="#86868b">&#8220;Ambien is not approved</text>
          <text x="762" y="100" font-size="10.5" fill="#86868b">for children. The pharmacy</text>
          <text x="762" y="114" font-size="10.5" fill="#86868b">paused this prescription.&#8221;</text>

          <rect x="746" y="182" width="154" height="96" rx="14" fill="#ffffff" stroke="#c62828"/>
          <text x="762" y="208" font-size="13" font-weight="600" fill="#c62828">Pharmacist</text>
          <text x="762" y="230" font-size="12" font-weight="600" fill="#1d1d1f">&#8220;Do not fill.&#8221;</text>
          <text x="762" y="248" font-size="10.5" fill="#86868b">Numbered findings,</text>
          <text x="762" y="262" font-size="10.5" fill="#86868b">each with its citation.</text>

          <rect x="746" y="324" width="154" height="96" rx="14" fill="#ffffff" stroke="#d2d2d7"/>
          <text x="762" y="350" font-size="13" font-weight="600" fill="#1d1d1f">MD</text>
          <text x="762" y="370" font-size="10.5" fill="#86868b">&#8220;James Smith, age 11,</text>
          <text x="762" y="384" font-size="10.5" fill="#86868b">was prescribed Ambien.</text>
          <text x="762" y="398" font-size="10.5" fill="#86868b">Minimum age is 18.&#8221;</text>
        </svg>
