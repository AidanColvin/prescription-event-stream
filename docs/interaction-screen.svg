<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 400" width="920" height="400" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif">
  <rect width="920" height="400" fill="#f5f5f7"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#86868b" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="30" y="44" font-size="20" font-weight="600" fill="#1d1d1f" letter-spacing="-0.3">Drug interaction screen</text>
  <text x="30" y="66" font-size="13" fill="#86868b">An interaction is a property of two prescriptions in one body, so the screen runs per person, never across patients.</text>

  <!-- One patient's regimen -->
  <rect x="30" y="110" width="230" height="200" rx="16" fill="#ffffff" stroke="#d2d2d7"/>
  <text x="50" y="142" font-size="14" font-weight="600" fill="#1d1d1f">One patient's regimen</text>
  <text x="50" y="162" font-size="12" fill="#86868b">Mary Smith, 48</text>
  <rect x="50" y="178" width="190" height="26" rx="8" fill="#f5f5f7"/>
  <text x="62" y="195" font-size="12" fill="#1d1d1f">Sertraline (Zoloft)</text>
  <rect x="50" y="210" width="190" height="26" rx="8" fill="#f5f5f7"/>
  <text x="62" y="227" font-size="12" fill="#1d1d1f">Tramadol HCl (Ultram)</text>
  <rect x="50" y="242" width="190" height="26" rx="8" fill="#f5f5f7"/>
  <text x="62" y="259" font-size="12" fill="#1d1d1f">Ibuprofen (Motrin)</text>
  <rect x="50" y="274" width="190" height="26" rx="8" fill="#f5f5f7"/>
  <text x="62" y="291" font-size="12" fill="#1d1d1f">Levothyroxine (Synthroid)</text>

  <line x1="260" y1="210" x2="308" y2="210" stroke="#86868b" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Pair screen -->
  <rect x="312" y="140" width="240" height="140" rx="16" fill="#ffffff" stroke="#d2d2d7"/>
  <text x="432" y="176" font-size="14" font-weight="600" fill="#1d1d1f" text-anchor="middle">Every pair, screened</text>
  <text x="432" y="198" font-size="12" fill="#86868b" text-anchor="middle">6 pairs checked against known</text>
  <text x="432" y="214" font-size="12" fill="#86868b" text-anchor="middle">interactions from AHFS and</text>
  <text x="432" y="230" font-size="12" fill="#86868b" text-anchor="middle">FDA prescribing information</text>
  <text x="432" y="256" font-size="11.5" fill="#86868b" text-anchor="middle" font-family="ui-monospace, Menlo, monospace">src/rules/interactions.py</text>

  <line x1="552" y1="210" x2="600" y2="210" stroke="#86868b" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- Findings -->
  <rect x="604" y="110" width="286" height="106" rx="14" fill="#ffffff" stroke="#c62828"/>
  <rect x="622" y="128" width="52" height="22" rx="11" fill="#fff5f5"/>
  <text x="632" y="143" font-size="11" font-weight="600" fill="#c62828">Major</text>
  <text x="622" y="170" font-size="13" font-weight="600" fill="#1d1d1f">Sertraline + Tramadol</text>
  <text x="622" y="188" font-size="11.5" fill="#86868b">Serotonin syndrome risk. Avoid the</text>
  <text x="622" y="202" font-size="11.5" fill="#86868b">combination; contact the prescriber.</text>

  <rect x="604" y="228" width="286" height="106" rx="14" fill="#ffffff" stroke="#d2d2d7"/>
  <rect x="622" y="246" width="76" height="22" rx="11" fill="#fff8e6"/>
  <text x="632" y="261" font-size="11" font-weight="600" fill="#9a6700">Moderate</text>
  <text x="622" y="288" font-size="13" font-weight="600" fill="#1d1d1f">Sertraline + Ibuprofen</text>
  <text x="622" y="306" font-size="11.5" fill="#86868b">GI bleeding risk roughly doubles.</text>
  <text x="622" y="320" font-size="11.5" fill="#86868b">Watch for dark stools; ask about a PPI.</text>

  <text x="30" y="360" font-size="12" fill="#86868b">Each finding carries the clinical mechanism for the pharmacist and MD, a plain-language warning for the patient,</text>
  <text x="30" y="378" font-size="12" fill="#86868b">and one suggested action. Warfarin + ibuprofen never fires here: they belong to different patients.</text>
</svg>
